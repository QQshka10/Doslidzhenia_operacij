<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Симплекс метод</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
  }

  header {
    background: #1d1d1f;
    color: #fff;
    padding: 20px 32px;
  }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header span { font-size: 0.85rem; color: #888; }

  .container { max-width: 960px; margin: 0 auto; padding: 32px 16px; }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 20px; color: #444; }

  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }

  label { font-size: 0.875rem; color: #555; }

  input[type=number], select {
    border: 1.5px solid #d2d2d7;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.9rem;
    width: 90px;
    background: #fff;
  }
  select { width: auto; }

  .constraint-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
    padding: 10px 12px;
    background: #f5f5f7;
    border-radius: 8px;
  }
  .constraint-row .remove-btn {
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    color: #c00;
    font-size: 1.1rem;
  }

  button {
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    padding: 9px 18px;
  }
  .btn-primary { background: #0071e3; color: #fff; font-weight: 600; }
  .btn-primary:hover { background: #005bb5; }
  .btn-secondary { background: #e8e8ed; color: #333; }
  .btn-outline { background: transparent; border: 1.5px solid #0071e3; color: #0071e3; }

  .button-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }

  .result-box {
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .result-optimal { background: #e8f5e9; border: 1.5px solid #4caf50; }
  .result-unbounded { background: #fff3e0; border: 1.5px solid #ff9800; }
  .result-infeasible { background: #ffeaea; border: 1.5px solid #f44336; }

  .result-box .values { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Симплекс метод</h1>
    <span>Лінійне програмування - лабораторна робота №2</span>
  </div>
</header>

<div class="container">

  <div class="card">
    <h2>Налаштування задачі</h2>
    <div class="row">
      <label>Кількість змінних:</label>
      <input type="number" id="n_vars" min="1" max="10" value="2">
      <label>Тип задачі:</label>
      <select id="objective">
        <option value="max">Максимізація</option>
        <option value="min">Мінімізація</option>
      </select>
      <button class="btn-secondary" onclick="buildForm()">Застосувати</button>
    </div>
  </div>

  <div class="card">
    <h2>Цільова функція</h2>
    <div id="obj-inputs" class="row"></div>
  </div>

  <div class="card">
    <h2>Обмеження</h2>
    <div id="constraints-list"></div>
    <div class="button-row">
      <button class="btn-outline" onclick="addConstraint()">+ Додати обмеження</button>
      <button class="btn-secondary" onclick="loadExample()">Завантажити приклад з лаб.1</button>
    </div>
  </div>

  <div class="button-row" style="margin-bottom:20px">
    <button class="btn-primary" onclick="solve()" style="padding:12px 32px">Розв'язати</button>
    <button class="btn-secondary" onclick="reset()">Очистити</button>
  </div>

  <div id="result-area"></div>

</div>

<script>
let nVars = 2;
let constraintCount = 0;

function buildForm() {
  nVars = parseInt(document.getElementById('n_vars').value) || 2;
  constraintCount = 0;
  renderObjective();
  document.getElementById('constraints-list').innerHTML = '';
  document.getElementById('result-area').innerHTML = '';
}

function renderObjective() {
  const div = document.getElementById('obj-inputs');
  div.innerHTML = '';
  for (let i = 0; i < nVars; i++) {
    if (i > 0) div.appendChild(document.createTextNode(' + '));
    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = 'any'; inp.value = '0';
    inp.id = `c_${i}`; inp.style.width = '72px';
    div.appendChild(inp);
    const lbl = document.createElement('span');
    lbl.textContent = `x${i+1}`;
    div.appendChild(lbl);
  }
}

function addConstraint(coeffs = null, rhs = null, type = '≤') {
  constraintCount++;
  const id = constraintCount;
  const div = document.createElement('div');
  div.className = 'constraint-row';
  div.id = `con_${id}`;

  for (let i = 0; i < nVars; i++) {
    if (i > 0) div.appendChild(document.createTextNode(' + '));
    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = 'any';
    inp.value = (coeffs && coeffs[i] !== undefined) ? coeffs[i] : '0';
    inp.id = `a_${id}_${i}`; inp.style.width = '72px';
    div.appendChild(inp);
    div.appendChild(document.createTextNode(`x${i+1}`));
  }

  const select = document.createElement('select');
  select.id = `type_${id}`;
  ['≤', '≥', '='].forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    select.appendChild(opt);
  });
  select.value = type;
  div.appendChild(select);

  const rhsInp = document.createElement('input');
  rhsInp.type = 'number'; rhsInp.step = 'any';
  rhsInp.value = rhs !== undefined ? rhs : '0';
  rhsInp.id = `b_${id}`;
  rhsInp.style.width = '80px';
  div.appendChild(rhsInp);

  const rm = document.createElement('button');
  rm.textContent = '✕';
  rm.className = 'remove-btn';
  rm.onclick = () => div.remove();
  div.appendChild(rm);

  document.getElementById('constraints-list').appendChild(div);
}

function loadExample() {
  nVars = 2;
  document.getElementById('n_vars').value = 2;
  document.getElementById('objective').value = 'max';
  buildForm();
  document.getElementById('c_0').value = 5;
  document.getElementById('c_1').value = 4;
  const cons = [
    { coeffs: [6, 4], rhs: 24, type: '≤' },
    { coeffs: [1, 2], rhs: 6, type: '≤' },
    { coeffs: [-1, 1], rhs: 1, type: '≤' },
    { coeffs: [0, 1], rhs: 2, type: '≤' },
  ];
  cons.forEach(c => addConstraint(c.coeffs, c.rhs, c.type));
}

function reset() {
  buildForm();
  document.getElementById('constraints-list').innerHTML = '';
  document.getElementById('result-area').innerHTML = '';
}

function round6(v) {
  return Math.round(v * 1000000) / 1000000;
}

async function solve() {
  const objective = document.getElementById('objective').value;
  const c = [];
  for (let i = 0; i < nVars; i++) {
    const v = parseFloat(document.getElementById(`c_${i}`).value);
    c.push(isNaN(v) ? 0 : v);
  }

  const conRows = document.querySelectorAll('.constraint-row');
  const A = [], b = [], constraints_types = [];

  for (let row of conRows) {
    const id = row.id.split('_')[1];
    const rowCoeffs = [];
    for (let i = 0; i < nVars; i++) {
      const v = parseFloat(document.getElementById(`a_${id}_${i}`).value);
      rowCoeffs.push(isNaN(v) ? 0 : v);
    }
    const rhs = parseFloat(document.getElementById(`b_${id}`).value);
    const type = document.getElementById(`type_${id}`).value;
    if (isNaN(rhs)) return alert('Заповніть всі поля');
    A.push(rowCoeffs);
    b.push(rhs);
    constraints_types.push(type);
  }

  if (A.length === 0) return alert('Додайте хоча б одне обмеження');

  const res = await fetch('/solve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ n_vars: nVars, c, A, b, objective, constraints_types })
  });
  const data = await res.json();

  const area = document.getElementById('result-area');
  if (data.error) {
    area.innerHTML = `<div class="result-box result-infeasible"><h3>Помилка</h3><p>${data.error}</p></div>`;
  } else if (data.status === 'optimal') {
    const xVals = data.x.map((v, i) => `x${i+1} = ${round6(v)}`).join(' &nbsp;|&nbsp; ');
    area.innerHTML = `
      <div class="result-box result-optimal">
        <h3>✅ Оптимальний розв'язок</h3>
        <div class="values">${xVals}</div>
        <div style="margin-top:12px">Z = <strong>${round6(data.obj)}</strong></div>
      </div>`;
  } else if (data.status === 'unbounded') {
    area.innerHTML = `<div class="result-box result-unbounded"><h3>⚠️ Задача необмежена</h3></div>`;
  } else {
    area.innerHTML = `<div class="result-box result-infeasible"><h3>❌ Немає допустимого розв'язку</h3></div>`;
  }
}

buildForm();
</script>
</body>
</html>
