<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>М-метод | Лінійне програмування</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Courier New', monospace;
    background: #1e1e2f;
    color: #eee;
    padding: 20px;
  }

  .wrapper {
    max-width: 1000px;
    margin: 0 auto;
  }

  .header {
    background: #2d2d44;
    padding: 20px;
    margin-bottom: 25px;
    border-left: 5px solid #ffaa44;
  }

  .header h1 {
    font-size: 1.8rem;
    letter-spacing: 2px;
  }

  .header p {
    color: #aaa;
    margin-top: 8px;
  }

  .card {
    background: #2a2a3b;
    border: 1px solid #444;
    padding: 20px;
    margin-bottom: 20px;
  }

  .card h2 {
    font-size: 1.2rem;
    margin-bottom: 15px;
    color: #ffaa44;
    text-transform: uppercase;
  }

  input, select {
    background: #3a3a4f;
    border: 1px solid #555;
    color: #eee;
    padding: 6px 10px;
    font-family: monospace;
    font-size: 0.9rem;
  }

  input:focus, select:focus {
    outline: none;
    border-color: #ffaa44;
  }

  button {
    background: #3a3a4f;
    border: 1px solid #ffaa44;
    color: #ffaa44;
    padding: 6px 14px;
    cursor: pointer;
    font-family: monospace;
    transition: 0.2s;
  }

  button:hover {
    background: #ffaa44;
    color: #1e1e2f;
  }

  .btn-primary {
    background: #ffaa44;
    color: #1e1e2f;
    font-weight: bold;
  }

  .btn-primary:hover {
    background: #ffcc66;
  }

  .constraint-row {
    background: #222233;
    padding: 10px;
    margin-bottom: 8px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }

  .remove-btn {
    margin-left: auto;
    background: none;
    border-color: #aa4444;
    color: #aa4444;
  }

  .remove-btn:hover {
    background: #aa4444;
    color: #fff;
  }

  .result {
    border-top: 3px solid #ffaa44;
    padding: 15px;
    margin-top: 10px;
    font-size: 1.1rem;
  }

  .optimal {
    background: #1a3a1a;
    border: 1px solid #44ff44;
  }
  .unbounded {
    background: #4a3a1a;
    border: 1px solid #ffaa44;
  }
  .infeasible {
    background: #3a1a1a;
    border: 1px solid #ff4444;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>M-метод (метод штучного базису)</h1>
    <p>Розв'язання задач лінійного програмування з обмеженнями ≤, ≥, =</p>
  </div>

  <div class="card">
    <h2>Параметри задачі</h2>
    <label>Кількість змінних:</label>
    <input type="number" id="num_vars" min="1" max="10" value="2" style="width:70px">
    <label style="margin-left:15px">Оптимізація:</label>
    <select id="opt_dir">
      <option value="max">Максимізація</option>
      <option value="min">Мінімізація</option>
    </select>
    <button onclick="rebuildForm()" style="margin-left:15px">Оновити</button>
  </div>

  <div class="card">
    <h2>Цільова функція Z =</h2>
    <div id="obj_panel"></div>
  </div>

  <div class="card">
    <h2>Система обмежень</h2>
    <div id="con_panel"></div>
    <button onclick="addConstraint()">+ Додати обмеження</button>
    <button onclick="loadTest()" style="margin-left:10px">Завантажити тест (лаб.№1)</button>
  </div>

  <button class="btn-primary" onclick="solveProblem()">РОЗВ'ЯЗАТИ М-МЕТОДОМ</button>
  <button onclick="clearAll()" style="margin-left:10px">Очистити</button>

  <div id="result_panel" style="margin-top:25px"></div>
</div>

<script>
let varCount = 2;
let conId = 0;

function rebuildForm() {
  varCount = parseInt(document.getElementById('num_vars').value) || 2;
  conId = 0;
  drawObjective();
  document.getElementById('con_panel').innerHTML = '';
  document.getElementById('result_panel').innerHTML = '';
}

function drawObjective() {
  const panel = document.getElementById('obj_panel');
  panel.innerHTML = '';
  for (let i = 0; i < varCount; i++) {
    if (i > 0) panel.appendChild(document.createTextNode(' + '));
    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = 'any'; inp.value = '0';
    inp.id = `obj_${i}`; inp.style.width = '70px';
    panel.appendChild(inp);
    panel.appendChild(document.createTextNode(` x${i+1}`));
  }
}

function addConstraint(coeffs = null, rhsVal = null, typ = '<=') {
  conId++;
  const id = conId;
  const div = document.createElement('div');
  div.className = 'constraint-row';
  div.id = `con_${id}`;

  for (let i = 0; i < varCount; i++) {
    if (i > 0) div.appendChild(document.createTextNode(' + '));
    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = 'any';
    inp.value = (coeffs && coeffs[i] !== undefined) ? coeffs[i] : '0';
    inp.id = `a_${id}_${i}`; inp.style.width = '70px';
    div.appendChild(inp);
    div.appendChild(document.createTextNode(` x${i+1}`));
  }

  const sel = document.createElement('select');
  sel.id = `type_${id}`;
  ['<=', '>=', '='].forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    sel.appendChild(opt);
  });
  sel.value = typ;
  div.appendChild(sel);

  const rhsInp = document.createElement('input');
  rhsInp.type = 'number'; rhsInp.step = 'any';
  rhsInp.value = (rhsVal !== undefined) ? rhsVal : '0';
  rhsInp.id = `b_${id}`; rhsInp.style.width = '80px';
  div.appendChild(rhsInp);

  const rm = document.createElement('button');
  rm.textContent = '✕';
  rm.className = 'remove-btn';
  rm.onclick = () => div.remove();
  div.appendChild(rm);

  document.getElementById('con_panel').appendChild(div);
}

function loadTest() {
  varCount = 2;
  document.getElementById('num_vars').value = 2;
  document.getElementById('opt_dir').value = 'max';
  rebuildForm();
  document.getElementById('obj_0').value = 5;
  document.getElementById('obj_1').value = 4;
  // видалити старі обмеження
  document.getElementById('con_panel').innerHTML = '';
  const testCons = [
    { coeffs: [6, 4], rhs: 24, type: '<=' },
    { coeffs: [1, 2], rhs: 6, type: '<=' },
    { coeffs: [-1, 1], rhs: 1, type: '<=' },
    { coeffs: [0, 1], rhs: 2, type: '<=' }
  ];
  testCons.forEach(c => addConstraint(c.coeffs, c.rhs, c.type));
}

function clearAll() {
  rebuildForm();
  document.getElementById('con_panel').innerHTML = '';
  document.getElementById('result_panel').innerHTML = '';
}

async function solveProblem() {
  const optDir = document.getElementById('opt_dir').value;
  const objCoeffs = [];
  for (let i = 0; i < varCount; i++) {
    let v = parseFloat(document.getElementById(`obj_${i}`).value);
    if (isNaN(v)) v = 0;
    objCoeffs.push(v);
  }

  const rows = document.querySelectorAll('.constraint-row');
  const matrix = [], rhsVals = [], typesList = [];
  for (let rowDiv of rows) {
    const id = rowDiv.id.split('_')[1];
    const coeffs = [];
    for (let i = 0; i < varCount; i++) {
      let val = parseFloat(document.getElementById(`a_${id}_${i}`).value);
      if (isNaN(val)) val = 0;
      coeffs.push(val);
    }
    const rhs = parseFloat(document.getElementById(`b_${id}`).value);
    const tp = document.getElementById(`type_${id}`).value;
    if (isNaN(rhs)) return alert('Помилка: невірне значення правої частини');
    matrix.push(coeffs);
    rhsVals.push(rhs);
    typesList.push(tp);
  }

  if (matrix.length === 0) return alert('Додайте хоча б одне обмеження');

  const payload = {
    num_vars: varCount,
    obj_coeffs: objCoeffs,
    matrix: matrix,
    rhs: rhsVals,
    opt_dir: optDir,
    types_list: typesList
  };

  const resp = await fetch('/compute', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await resp.json();

  const resultDiv = document.getElementById('result_panel');
  if (data.error) {
    resultDiv.innerHTML = `<div class="result infeasible"><strong>❌ ПОМИЛКА:</strong> ${data.error}</div>`;
  } else if (data.status === 'optimal') {
    let solText = '';
    for (let i = 0; i < data.solution.length; i++) {
      solText += `x${i+1} = ${Math.round(data.solution[i]*1e6)/1e6}  `;
    }
    resultDiv.innerHTML = `
      <div class="result optimal">
        <strong>✅ ОПТИМАЛЬНИЙ РОЗВ'ЯЗОК (M-метод)</strong><br>
        ${solText}<br>
        <strong>Z = ${Math.round(data.value*1e6)/1e6}</strong>
      </div>`;
  } else if (data.status === 'unbounded') {
    resultDiv.innerHTML = `<div class="result unbounded"><strong>⚠️ ЗАДАЧА НЕОБМЕЖЕНА</strong><br>Цільова функція може зростати до нескінченності.</div>`;
  } else {
    resultDiv.innerHTML = `<div class="result infeasible"><strong>❌ НЕМАЄ ДОПУСТИМОГО РОЗВ'ЯЗКУ</strong><br>Система обмежень суперечлива.</div>`;
  }
}

rebuildForm();
</script>
</body>
</html>
