<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>М-метод</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
  }

  header {
    background: #1d1d1f;
    color: #fff;
    padding: 20px 32px;
  }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header span { font-size: 0.85rem; color: #888; }

  .container { max-width: 980px; margin: 0 auto; padding: 32px 16px; }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .card h2 {
    font-size: 0.8rem; font-weight: 600; margin-bottom: 20px;
    color: #666; text-transform: uppercase; letter-spacing: .06em;
  }

  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }

  label { font-size: 0.875rem; color: #555; white-space: nowrap; }

  input[type=number], select {
    border: 1.5px solid #d2d2d7;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.9rem;
    width: 88px;
    outline: none;
    background: #fff;
    transition: border-color .15s;
  }
  input[type=number]:focus, select:focus { border-color: #0071e3; }
  select { width: auto; cursor: pointer; }

  .coeff-lbl { font-size: 0.85rem; color: #888; min-width: 28px; text-align: center; }
  .op { font-size: 1rem; color: #aaa; padding: 0 2px; }
  .ineq-select {
    width: auto; padding: 7px 10px; font-size: 0.9rem;
    border: 1.5px solid #d2d2d7; border-radius: 8px;
    background: #fff; cursor: pointer; outline: none;
  }
  .ineq-select:focus { border-color: #0071e3; }

  .con-row {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap; margin-bottom: 10px;
    padding: 10px 12px; background: #f5f5f7; border-radius: 8px;
  }
  .con-row .rm {
    margin-left: auto; background: none; border: none;
    cursor: pointer; color: #c00; font-size: 1.1rem;
    padding: 2px 6px; border-radius: 6px;
  }
  .con-row .rm:hover { background: #ffeaea; }

  button {
    border: none; border-radius: 8px; cursor: pointer;
    font-size: 0.9rem; padding: 9px 18px; transition: background .15s;
  }
  .btn-primary { background: #0071e3; color: #fff; font-weight: 600; }
  .btn-primary:hover { background: #005bb5; }
  .btn-secondary { background: #e8e8ed; color: #333; }
  .btn-secondary:hover { background: #d2d2d7; }
  .btn-outline { background: transparent; border: 1.5px solid #0071e3; color: #0071e3; }
  .btn-outline:hover { background: #e8f0fb; }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .hint { font-size: 0.8rem; color: #888; margin-top: 6px; font-style: italic; }

  .res-box { border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; }
  .res-optimal  { background: #e8f5e9; border: 1.5px solid #4caf50; }
  .res-unbounded{ background: #fff3e0; border: 1.5px solid #ff9800; }
  .res-infeasible{background: #ffeaea; border: 1.5px solid #f44336; }
  .res-box h3 { font-size: 1.05rem; margin-bottom: 10px; }
  .val-row { margin-top: 8px; font-size: 0.95rem; }

  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    margin-left: 8px; vertical-align: middle;
  }
  .badge-m { background: #ede7f6; color: #6a1b9a; }
</style>
</head>
<body>

<header>
  <h1>М-метод</h1>
  <span>Лінійне програмування - лабораторна робота №4</span>
</header>

<div class="container">

  <div class="card">
    <h2>Налаштування задачі</h2>
    <div class="row">
      <label>Кількість змінних:</label>
      <input type="number" id="n_vars" min="1" max="10" value="2">
      <label>Тип задачі:</label>
      <select id="objective">
        <option value="max">Максимізація</option>
        <option value="min">Мінімізація</option>
      </select>
      <button class="btn-secondary" onclick="buildForm()">Застосувати</button>
    </div>
  </div>

  <div class="card">
    <h2>Цільова функція &nbsp;<span id="obj-lbl" style="color:#0071e3;font-size:.85rem;text-transform:none;letter-spacing:0">Z → max</span></h2>
    <div id="obj-inputs" class="row"></div>
  </div>

  <div class="card">
    <h2>Обмеження <small style="font-weight:400;color:#888;text-transform:none;letter-spacing:0">(підтримуються ≤, ≥, =)</small></h2>
    <div id="constraints-list"></div>
    <div class="btn-row">
      <button class="btn-outline" onclick="addConstraint()">+ Додати обмеження</button>
      <button class="btn-secondary" onclick="loadExample()">Приклад з лаб.1</button>
      <button class="btn-secondary" onclick="loadExampleGe()">Приклад з ≥ та =</button>
    </div>
    <p class="hint">Для ≤ — додається slack; для ≥ і = — додаються штучні змінні з штрафом M</p>
  </div>

  <div class="btn-row" style="margin-bottom:20px">
    <button class="btn-primary" onclick="solve()" style="padding:12px 32px;font-size:1rem">Розв'язати</button>
    <button class="btn-secondary" onclick="resetAll()">Очистити</button>
  </div>

  <div id="result-area"></div>

</div>

<script>
let nVars = 2;
let conCount = 0;

function buildForm() {
  nVars = parseInt(document.getElementById('n_vars').value) || 2;
  conCount = 0;
  renderObjective();
  document.getElementById('constraints-list').innerHTML = '';
  document.getElementById('result-area').innerHTML = '';
}

function renderObjective() {
  const obj = document.getElementById('objective').value;
  document.getElementById('obj-lbl').textContent = obj === 'max' ? 'Z → max' : 'Z → min';
  const div = document.getElementById('obj-inputs');
  div.innerHTML = '';
  for (let i = 0; i < nVars; i++) {
    if (i > 0) {
      const s = document.createElement('span');
      s.className = 'op'; s.textContent = '+'; div.appendChild(s);
    }
    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = 'any'; inp.value = '0';
    inp.id = `c_${i}`; inp.style.width = '72px';
    div.appendChild(inp);
    const lbl = document.createElement('span');
    lbl.className = 'coeff-lbl'; lbl.textContent = `x${i+1}`; div.appendChild(lbl);
  }
}

function addConstraint(coeffs, type, rhs) {
  conCount++;
  const id = conCount;
  const div = document.createElement('div');
  div.className = 'con-row'; div.id = `con_${id}`;

  for (let i = 0; i < nVars; i++) {
    if (i > 0) {
      const s = document.createElement('span');
      s.className = 'op'; s.textContent = '+'; div.appendChild(s);
    }
    const inp = document.createElement('input');
    inp.type = 'number'; inp.step = 'any';
    inp.value = (coeffs && coeffs[i] !== undefined) ? coeffs[i] : '0';
    inp.id = `a_${id}_${i}`; inp.style.width = '72px';
    div.appendChild(inp);
    const lbl = document.createElement('span');
    lbl.className = 'coeff-lbl'; lbl.textContent = `x${i+1}`; div.appendChild(lbl);
  }

  const sel = document.createElement('select');
  sel.className = 'ineq-select'; sel.id = `type_${id}`;
  ['<=', '>=', '='].forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    if (t === (type || '<=')) opt.selected = true;
    sel.appendChild(opt);
  });
  div.appendChild(sel);

  const rhsInp = document.createElement('input');
  rhsInp.type = 'number'; rhsInp.step = 'any';
  rhsInp.value = rhs !== undefined ? rhs : '0';
  rhsInp.id = `b_${id}`;
  div.appendChild(rhsInp);

  const rm = document.createElement('button');
  rm.className = 'rm'; rm.textContent = '✕';
  rm.onclick = () => div.remove();
  div.appendChild(rm);

  document.getElementById('constraints-list').appendChild(div);
}

function loadExample() {
  nVars = 2;
  document.getElementById('n_vars').value = 2;
  document.getElementById('objective').value = 'max';
  buildForm();
  document.getElementById('c_0').value = 5;
  document.getElementById('c_1').value = 4;
  [
    { c: [6, 4], t: '<=', b: 24 },
    { c: [1, 2], t: '<=', b: 6  },
    { c: [-1, 1], t: '<=', b: 1 },
    { c: [0, 1],  t: '<=', b: 2 },
  ].forEach(r => addConstraint(r.c, r.t, r.b));
}

function loadExampleGe() {
  nVars = 2;
  document.getElementById('n_vars').value = 2;
  document.getElementById('objective').value = 'min';
  buildForm();
  document.getElementById('c_0').value = 2;
  document.getElementById('c_1').value = 3;
  [
    { c: [1, 1], t: '>=', b: 4 },
    { c: [1, 3], t: '>=', b: 6 },
    { c: [1, 1], t: '=',  b: 5 },
  ].forEach(r => addConstraint(r.c, r.t, r.b));
}

function resetAll() {
  buildForm();
  document.getElementById('constraints-list').innerHTML = '';
  document.getElementById('result-area').innerHTML = '';
}

function r6(v) { return Math.round(v * 1e6) / 1e6; }

async function solve() {
  const objective = document.getElementById('objective').value;
  const c = [];
  for (let i = 0; i < nVars; i++) {
    const v = parseFloat(document.getElementById(`c_${i}`).value);
    c.push(isNaN(v) ? 0 : v);
  }

  const rows = document.querySelectorAll('.con-row');
  if (rows.length === 0) { alert('Додайте хоча б одне обмеження'); return; }

  const A = [], b = [], constraint_types = [];
  rows.forEach(row => {
    const id = row.id.split('_')[1];
    const rowC = [];
    for (let i = 0; i < nVars; i++) {
      const v = parseFloat(document.getElementById(`a_${id}_${i}`).value);
      rowC.push(isNaN(v) ? 0 : v);
    }
    const rhs = parseFloat(document.getElementById(`b_${id}`).value);
    const type = document.getElementById(`type_${id}`).value;
    A.push(rowC); b.push(isNaN(rhs) ? 0 : rhs); constraint_types.push(type);
  });

  const res = await fetch('/solve', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ n_vars: nVars, c, A, b, constraint_types, objective })
  });
  const data = await res.json();
  renderResult(data, c, objective);
}

function renderResult(data, c, objective) {
  const area = document.getElementById('result-area');
  if (data.error) {
    area.innerHTML = `<div class="res-box res-infeasible"><h3>Помилка</h3><p>${data.error}</p></div>`;
    return;
  }
  if (data.status === 'optimal') {
    const xVals = data.x.map((v, i) => `x${i+1} = <strong>${r6(v)}</strong>`).join(' &nbsp;|&nbsp; ');
    const zStr = c.map((ci, i) => `${ci}·x${i+1}`).join(' + ');
    area.innerHTML = `
      <div class="res-box res-optimal">
        <h3>✅ Оптимальний розв'язок знайдено</h3>
        <p style="font-size:.82rem;color:#555;margin-bottom:6px">Z = ${zStr} → ${objective}</p>
        <div class="val-row">${xVals}</div>
        <div style="margin-top:12px;font-size:1rem">
          Оптимальне значення: <strong style="font-size:1.3rem;color:#2e7d32">Z = ${r6(data.obj)}</strong>
        </div>
      </div>`;
  } else if (data.status === 'unbounded') {
    area.innerHTML = `<div class="res-box res-unbounded"><h3>⚠️ Задача необмежена</h3><p>Цільова функція прямує до нескінченності.</p></div>`;
  } else {
    area.innerHTML = `<div class="res-box res-infeasible"><h3>❌ Задача не має допустимого розв'язку</h3><p>Область допустимих рішень порожня.</p></div>`;
  }
}

buildForm();
</script>
</body>
</html>
